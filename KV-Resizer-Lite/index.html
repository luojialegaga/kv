<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KV Resizer Lite</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#bd9dff",
                        "primary-dim": "#8a4cfc",
                        "surface": "#0e0e0e",
                        "surface-container": "#1a1a1a",
                        "surface-bright": "#2c2c2c",
                        "on-surface": "#ffffff",
                        "on-surface-variant": "#adaaaa",
                        "outline": "#767575",
                        "outline-variant": "#484847",
                        "error": "#ff6e84",
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .ratio-box { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans h-screen flex">
    <!-- Left Sidebar -->
    <aside id="sidebar" class="w-64 bg-surface-container border-r border-outline-variant/15 flex flex-col">
        <div class="p-4 border-b border-outline-variant/15">
            <div class="flex items-center gap-3">
                <div class="h-8 w-8 bg-gradient-to-br from-primary to-primary-dim rounded-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-on-primary text-sm">auto_awesome</span>
                </div>
                <div>
                    <div class="text-white font-bold text-sm">KV Resizer</div>
                    <div class="text-[10px] text-on-surface-variant">Lite v1.0</div>
                </div>
            </div>
        </div>
        
        <nav id="controls" class="flex-1 p-4 space-y-4 overflow-y-auto">
            <!-- Ratio Preview Box -->
            <div class="flex justify-center py-2">
                <div id="ratioBox" class="ratio-box bg-primary/20 border-2 border-primary rounded-lg flex items-center justify-center shadow-lg shadow-primary/10"
                     style="width: 120px; height: 67.5px;">
                    <span id="ratioText" class="text-primary font-mono text-sm font-bold">16:9</span>
                </div>
            </div>
            
            <div>
                <div class="text-xs text-on-surface-variant mb-2 px-2">宽高比例</div>
                <select id="aspectRatio" class="w-full bg-surface-bright border border-outline-variant/15 rounded-lg px-3 py-2 text-sm">
                    <option value="1:1">1:1 (正方形)</option>
                    <option value="4:3">4:3</option>
                    <option value="3:4">3:4</option>
                    <option value="16:9" selected>16:9</option>
                    <option value="9:16">9:16</option>
                    <option value="21:9">21:9</option>
                    <option value="9:21">9:21</option>
                    <option value="1:4">1:4 (长条)</option>
                    <option value="4:1">4:1 (横幅)</option>
                    <option value="1:8">1:8 (摩天大楼)</option>
                    <option value="8:1">8:1 (全景)</option>
                </select>
            </div>
            
            <div>
                <div class="text-xs text-on-surface-variant mb-2 px-2">长边尺寸</div>
                <select id="longSide" class="w-full bg-surface-bright border border-outline-variant/15 rounded-lg px-3 py-2 text-sm">
                    <option value="1080">1080px</option>
                    <option value="1920" selected>1920px</option>
                    <option value="2560">2560px (2K)</option>
                    <option value="3840">3840px (4K)</option>
                </select>
            </div>
            
            <div id="uploadSection">
                <div class="text-xs text-on-surface-variant mb-2 px-2">KV 图片</div>
                <button onclick="document.getElementById('fileInput').click()" class="w-full flex items-center justify-center gap-2 bg-surface-bright hover:bg-surface-container-high border border-outline-variant/15 px-4 py-3 rounded-lg transition-all">
                    <span class="material-symbols-outlined">cloud_upload</span>
                    <span id="uploadBtnText">上传图片</span>
                </button>
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <p id="fileName" class="text-xs text-on-surface-variant mt-2 px-2 truncate"></p>
            </div>
            
            <button id="generateBtn" class="w-full bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold py-3 rounded-lg hover:brightness-110 transition-all">
                生成图片
            </button>
            
            <button id="resetBtn" class="w-full text-on-surface-variant text-sm py-2 hover:text-on-surface transition-colors">
                重置
            </button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex relative" id="mainContent">
        <!-- Center: Source Preview -->
        <div id="centerPanel" class="flex flex-col items-center justify-center p-8 border-r border-outline-variant/15" style="width: 50%;">
            <!-- Source Preview (after upload) -->
            <div id="sourcePreview" class="hidden flex flex-col items-center">
                <div class="relative">
                    <img id="sourceImg" class="max-w-full max-h-[50vh] rounded-xl shadow-2xl" src="" alt="Source">
                    <button onclick="removeImage()" class="absolute -top-3 -right-3 w-8 h-8 bg-error rounded-full flex items-center justify-center text-white hover:brightness-110 transition-all">
                        <span class="material-symbols-outlined text-sm">close</span>
                    </button>
                </div>
                <p class="text-xs text-on-surface-variant mt-3">原图预览</p>
            </div>
            
            <!-- Placeholder (before upload) -->
            <div id="centerPlaceholder" class="flex flex-col items-center">
                <span class="material-symbols-outlined text-6xl text-on-surface-variant/30 mb-4">image</span>
                <p class="text-sm text-on-surface-variant">上传图片后将显示在这里</p>
            </div>
        </div>
        
        <!-- Resizable Divider -->
        <div id="resizer" class="w-1 bg-outline-variant/30 hover:bg-primary cursor-col-resize transition-colors flex items-center justify-center" style="min-width: 4px;">
            <div class="w-1 h-8 bg-outline-variant/50 rounded-full"></div>
        </div>

        <!-- Right: Result -->
        <div id="rightPanel" class="flex flex-col items-center justify-center p-8" style="flex: 1;">
            <div id="resultPlaceholder" class="text-center">
                <span class="material-symbols-outlined text-6xl text-on-surface-variant/30 mb-4">image</span>
                <p class="text-sm text-on-surface-variant">生成的图片将显示在这里</p>
            </div>
            
            <div id="resultView" class="hidden flex flex-col items-center">
                <img id="resultImg" class="max-w-full max-h-[60vh] rounded-xl shadow-2xl" src="" alt="Result">
                
                <div class="mt-6 flex gap-4">
                    <button onclick="downloadResult()" class="flex items-center gap-2 bg-surface-bright px-6 py-3 rounded-lg hover:bg-surface-container-high transition-colors">
                        <span class="material-symbols-outlined">download</span>
                        <span>下载</span>
                    </button>
                    
                    <button onclick="newImage()" class="flex items-center gap-2 bg-primary text-on-primary px-6 py-3 rounded-lg hover:brightness-110 transition-all">
                        <span class="material-symbols-outlined">add</span>
                        <span>新建</span>
                    </button>
                </div>
            </div>
            
            <div id="loadingView" class="hidden flex flex-col items-center">
                <div class="w-12 h-12 border-2 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-on-surface">Generating...</p>
                <p class="text-xs text-on-surface-variant mt-2">This may take 10-30 seconds</p>
            </div>
        </div>
    </main>

    <script>
        // State
        let kvImage = null;
        let resultImage = null;

        // Ratio descriptions
        const ratioDescs = {
            '1:1': '正方形',
            '4:3': '标准屏幕',
            '3:4': '竖屏标准',
            '16:9': '横屏标准比例',
            '9:16': '竖屏标准比例',
            '21:9': '超宽屏',
            '9:21': '垂直长图',
            '1:4': '长条',
            '4:1': '横幅',
            '1:8': '摩天大楼',
            '8:1': '全景'
        };

        // Update ratio preview
        function updateRatioPreview() {
            const ratio = document.getElementById('aspectRatio').value;
            const [w, h] = ratio.split(':').map(Number);
            
            // Sidebar box size (max 120px)
            let boxW, boxH;
            const maxSize = 120;
            
            if (w >= h) {
                boxW = maxSize;
                boxH = maxSize * h / w;
            } else {
                boxH = maxSize;
                boxW = maxSize * w / h;
            }
            
            const box = document.getElementById('ratioBox');
            box.style.width = boxW + 'px';
            box.style.height = boxH + 'px';
            
            document.getElementById('ratioText').textContent = ratio;
        }

        // Handle file upload
        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                kvImage = e.target.result;
                document.getElementById('sourceImg').src = kvImage;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('uploadBtnText').textContent = '更换图片';
                
                // Show source preview
                document.getElementById('centerPlaceholder').classList.add('hidden');
                document.getElementById('sourcePreview').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            kvImage = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('fileName').textContent = '';
            document.getElementById('uploadBtnText').textContent = '上传图片';
            
            document.getElementById('sourcePreview').classList.add('hidden');
            document.getElementById('centerPlaceholder').classList.remove('hidden');
        }

        // Generate
        document.getElementById('generateBtn').addEventListener('click', async () => {
            if (!kvImage) {
                alert('请先上传图片');
                return;
            }
            
            const longSide = parseInt(document.getElementById('longSide').value);
            const ratio = document.getElementById('aspectRatio').value;
            const [wRatio, hRatio] = ratio.split(':').map(Number);
            
            let w, h;
            if (wRatio >= hRatio) {
                w = longSide;
                h = Math.round(longSide * hRatio / wRatio);
            } else {
                h = longSide;
                w = Math.round(longSide * wRatio / hRatio);
            }
            
            // Show loading
            document.getElementById('resultPlaceholder').classList.add('hidden');
            document.getElementById('resultView').classList.add('hidden');
            document.getElementById('loadingView').classList.remove('hidden');
            
            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ kv: kvImage, width: w, height: h })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    resultImage = data.image;
                    document.getElementById('resultImg').src = resultImage;
                    document.getElementById('loadingView').classList.add('hidden');
                    document.getElementById('resultView').classList.remove('hidden');
                } else {
                    alert('生成失败: ' + (data.error || '未知错误'));
                    document.getElementById('loadingView').classList.add('hidden');
                    document.getElementById('resultPlaceholder').classList.remove('hidden');
                }
            } catch (err) {
                alert('错误: ' + err.message);
                document.getElementById('loadingView').classList.add('hidden');
                document.getElementById('resultPlaceholder').classList.remove('hidden');
            }
        });

        function downloadResult() {
            if (!resultImage) return;
            const link = document.createElement('a');
            link.href = resultImage;
            link.download = `KV_${Date.now()}.png`;
            link.click();
        }

        function newImage() {
            kvImage = null;
            resultImage = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('fileName').textContent = '';
            document.getElementById('uploadBtnText').textContent = '上传图片';
            
            document.getElementById('sourcePreview').classList.add('hidden');
            document.getElementById('centerPlaceholder').classList.remove('hidden');
            document.getElementById('resultView').classList.add('hidden');
            document.getElementById('resultPlaceholder').classList.remove('hidden');
        }

        // Reset
        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('aspectRatio').value = '16:9';
            document.getElementById('longSide').value = '1920';
            updateRatioPreview();
        });

        // Listen for ratio changes
        document.getElementById('aspectRatio').addEventListener('change', updateRatioPreview);

        // Resizable divider
        const resizer = document.getElementById('resizer');
        const centerPanel = document.getElementById('centerPanel');
        const rightPanel = document.getElementById('rightPanel');
        const mainContent = document.getElementById('mainContent');
        
        let isResizing = false;
        
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            
            const mainRect = mainContent.getBoundingClientRect();
            const newCenterWidth = ((e.clientX - mainRect.left) / mainRect.width) * 100;
            
            // Limit: 20% - 80%
            if (newCenterWidth >= 20 && newCenterWidth <= 80) {
                centerPanel.style.width = newCenterWidth + '%';
            }
        });
        
        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });

        // Init
        updateRatioPreview();
    </script>
</body>
</html>
